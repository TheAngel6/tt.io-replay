<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Replay Emulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Replay Emulator</h1>
            <p>Enter a replay URL to view the corresponding version:</p>
        </header>

        <main>
            <form id="urlForm">
                <input type="text" id="urlInput" placeholder="Enter your URL here" required>
                <button type="submit">Submit</button>
            </form>

            <div id="error" class="error"></div>
        </main>

        <section id="sponsorSection">
            <h2>Sponsor</h2>
            <div id="sponsors">
                <!-- Example sponsored content -->
                <div class="sponsor">
                    <h3>Barti</h3>
                    <img src="pit\image1.png" alt="Clan Logo" class="sponsor-logo">
                    <a href="https://discord.gg/GGT7jPJw7c" target="_blank">
                        <button>Join here!</button>
                    </a>
                </div>
                <div class="sponsor">
                    <h3>Clan</h3>
                    <img src="pit\image2.png" alt="Clan Logo" class="sponsor-logo">
                    <a href="https://discord.gg/4Z7wSvXr5b" target="_blank">
                        <button>Join here!</button>
                    </a>
                </div>
                <div class="sponsor">
                    <h3>Clan</h3>
                    <img src="pit\image3.png" alt="Clan Logo" class="sponsor-logo">
                    <a href="https://discord.gg/example3" target="_blank">
                        <button>Join here!</button>
                    </a>
                </div>
            </div>
            <p>Advertise your Discord server here! Contact theangel2 to buy a spot!</p>
        </section>

        <footer>
            <p>&copy; 2024 Replay Emulator. All rights reserved.</p>
            <p>Credit: theangel2, hunterjrx & biggkiwi</p>
        </footer>
    </div>

    <button id="darkModeToggle" class="dark-mode-toggle">☀️</button>
    <script defer src="app.js"></script>
</body>
</html>
